<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Banquet Elite V.4.8 - Full Compilation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #6366f1;
        }
        
        html, body { 
            height: 100%; height: -webkit-fill-available;
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #f8fafc; margin: 0; padding: 0; overflow: hidden; 
        }

        .viewport-wrapper { 
            display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available;
            padding: 10px 14px; box-sizing: border-box;
        }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); border-radius: 1.5rem; 
            padding: 16px; flex: 1; display: flex; flex-direction: column; 
            justify-content: space-evenly; min-height: 0; margin-bottom: 8px;
        }

        /* High Contrast Typography */
        label { 
            font-size: 9px; font-weight: 800; text-transform: uppercase; 
            color: #cbd5e1; letter-spacing: 0.05em; margin-bottom: 2px; display: block; 
        }

        input, select { 
            background: rgba(15, 23, 42, 0.7); border: 1.2px solid var(--border); 
            border-radius: 0.75rem; padding: 8px 12px; color: white; width: 100%; 
            outline: none; font-size: 13px; font-weight: 700;
        }

        input:disabled, select:disabled { background: rgba(15, 23, 42, 0.4); color: #64748b; opacity: 0.6; }

        .btn-sync { 
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); 
            color: white; border-radius: 0.9rem; font-weight: 800; font-size: 11px; 
            height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-enable-edit {
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24; font-size: 10px; font-weight: 800; padding: 10px;
            border-radius: 0.8rem; display: none; width: 100%; text-align: center;
        }

        /* MODAL SCANNER - UKURAN DIPERBESAR */
        #tentative-modal { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.96); backdrop-filter: blur(12px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 12px; }
        .modal-content { 
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1); 
            width: 95%; max-width: 500px; height: 85vh; /* Lebih lebar & tinggi */
            border-radius: 2rem; padding: 24px; display: flex; flex-direction: column;
        }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }

        .footer-area { flex: 0 0 auto; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .footer-link { background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 1rem; padding: 10px; text-align: center; display: block; }
    </style>
</head>
<body>

    <div id="tentative-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-[10px] font-black text-white uppercase tracking-[0.2em]">📋 SCANNER ENGINE V.3.9</h2>
                <button onclick="closeModal()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            
            <div class="flex gap-2 mb-4 bg-white/5 p-1 rounded-15">
                <button onclick="loadFilteredData('TENTATIVE')" id="tab-tentative" class="tab-btn bg-[#6366f1] text-white">Tentative</button>
                <button onclick="loadFilteredData('CONFIRM')" id="tab-confirm" class="tab-btn text-slate-500">Confirm</button>
                <button onclick="loadFilteredData('NO STATUS')" id="tab-nostatus" class="tab-btn text-red-500/70">No Status</button>
            </div>

            <div id="list-container" class="flex-1 overflow-y-auto pr-1 space-y-2">
                </div>
        </div>
    </div>

    <div class="viewport-wrapper">
        <div class="flex items-center justify-between mb-2">
            <div>
                <h1 class="text-lg font-black italic text-white leading-none">BANQUET <span class="text-indigo-500">PRO</span></h1>
                <p class="text-[6px] font-bold text-slate-400 tracking-[0.3em] uppercase">V.4.8 Full Compilation</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openTentativeModal()" class="p-2 bg-white/5 rounded-xl border border-white/10 relative">
                    <span>🔔</span>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <button onclick="resetForm(true)" class="text-[8px] font-black text-red-400 bg-red-500/10 px-2.5 py-1 rounded-lg border border-red-500/20">RESET</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="grid grid-cols-2 gap-3">
                <div><label>📅 Tanggal</label><input type="date" id="input-date" onchange="checkAvailability()"></div>
                <div><label>🏛️ Venue</label>
    <select id="input-venue" onchange="checkAvailability()">
        <option value="">-- PILIH --</option>
        <option value="BALL ROOM">BALL ROOM</option>
        <option value="VIP ROOM">VIP ROOM</option>
        <option value="TERATAI ROOM">TERATAI ROOM</option>
        <option value="FOX STEAK HOUSE">FOX STEAK HOUSE</option>
    </select>
            </div>
            </div>

            <div id="avail-status" class="hidden w-full py-2 rounded-xl text-[9px] font-black border text-center uppercase tracking-widest"></div>

            <div id="form-details" class="space-y-2.5 opacity-20 pointer-events-none transition-all">
                <div><label>👤 Customer</label><input type="text" id="input-customer"></div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div><label>⚡ Status</label><select id="input-status" onchange="updateStatusUI()">
                        <option value="">-- PILIH --</option>
                        <option value="TENTATIVE">TENTATIVE</option>
                        <option value="CONFIRM">CONFIRM</option>
                        <option value="DONE">DONE</option>
                    </select></div>
                    <div><label>📦 Package</label><select id="input-package">
                       <option value="">-- Pilih --</option>
                    <option value="FULL BOARD">FULL BOARD</option>
                    <option value="HALF DAY">HALF DAY</option>
                    <option value="FULL DAY">FULL DAY</option>
                    <option value="WEDDING">WEDDING</option>
                    <option value="AKAD NIKAH">AKAD NIKAH</option>
                    <option value="ARISAN">ARISAN</option>
                    <option value="ULANG TAHUN">ULANG TAHUN</option>
                    <option value="TABLE MANER">TABLE MANER</option>
                    <option value="DINNER">DINNER</option>
                    <option value="LUNCH">LUNCH</option>
                </select></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div><label>💼 PIC</label><select id="input-sales"><option value="DWI">DWI</option><option value="TINA">TINA</option></select></div>
                    <div><label>🕒 Waktu</label><input type="text" id="input-time" placeholder="08:00-13:00"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div><label>👥 Pax</label><input type="number" id="input-pax" oninput="calcTotal()"></div>
                    <div><label>💰 Harga</label><input type="text" id="input-price-display" oninput="formatCurrency(this)"><input type="hidden" id="input-price"></div>
                </div>

                <div class="bg-indigo-500/10 border border-indigo-500/20 p-3 rounded-xl flex justify-between items-center">
                    <div><p class="text-[7px] font-black text-indigo-400 uppercase">Revenue Estimation</p><p id="display-total" class="text-lg font-black text-emerald-400">Rp 0</p></div>
                    <span class="text-xl">💎</span>
                </div>

                <div id="action-area" class="flex flex-col gap-2">
                    <button id="btn-save" onclick="submitData()" class="btn-sync">🚀 SYNC TO CLOUD</button>
                    <button id="btn-unlock" onclick="toggleLock(false)" class="btn-enable-edit">🔓 ENABLE EDIT (LOCKED)</button>
                    <button id="btn-delete" onclick="deleteData()" class="hidden bg-red-500/10 border border-red-500/20 text-red-500 py-2.5 rounded-xl font-bold text-[10px]">🗑️ DELETE DATA</button>
                </div>
            </div>
        </div>

        <div class="footer-area">
            <a href="https://lotus-garden-hotel.github.io/BEO-Lotus-Garden-Hotel/" target="_blank" class="footer-link">
                <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest flex items-center justify-center gap-2">📂 OPEN DASHBOARD <span class="text-white">↗</span></p>
            </a>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBZjSmOA81ftVsIJT5etEL19NjPdYTVSQk';
        const SHEET_ID = '1MXwfVXORuTd125BCkKYP_mHC_6O_Z1mZcGno2VCGOeE';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzfI58sOfu6RFivMxA32lGhCL-Q7t6S5oyldiQWJPACZ3gvbiL_qNITpk9EwOdcXEjE/exec';
        const monthNames = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

        // SCANNER ENGINE (V.3.9 + NO STATUS INJECTION)
        function openTentativeModal() { document.getElementById('tentative-modal').style.display = 'flex'; loadFilteredData('TENTATIVE'); }
        function closeModal() { document.getElementById('tentative-modal').style.display = 'none'; }

        async function loadFilteredData(filterType) {
            const container = document.getElementById('list-container');
            
            // UI Tab Switcher
            document.querySelectorAll('.tab-btn').forEach(b => { b.className = 'tab-btn text-slate-500'; });
            const activeTab = filterType === 'TENTATIVE' ? 'tab-tentative' : (filterType === 'CONFIRM' ? 'tab-confirm' : 'tab-nostatus');
            document.getElementById(activeTab).className = filterType === 'NO STATUS' ? 'tab-btn bg-red-500 text-white' : 'tab-btn bg-[#6366f1] text-white';

            container.innerHTML = '<p class="text-center text-[10px] animate-pulse py-10 text-slate-500 font-black">SCANNING CLOUD...</p>';
            
            try {
                const now = new Date();
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${monthNames[now.getMonth()]}!A8:D132?key=${API_KEY}`);
                const data = await res.json();
                let curDay = "";
                
                let filtered = (data.values || []).filter(r => {
                    if (r[0]) curDay = r[0]; r.dateRef = curDay;
                    const customer = (r[2] || "").trim();
                    const status = (r[3] || "").toUpperCase().trim();

                    if (filterType === 'TENTATIVE') return status === 'TENTATIVE';
                    if (filterType === 'CONFIRM') return status === 'CONFIRM';
                    if (filterType === 'NO STATUS') return customer !== "" && status === ""; // INJEKSI NO STATUS
                    return false;
                });

                container.innerHTML = filtered.map(r => {
                    const dNum = r.dateRef.match(/\d+/)[0].padStart(2, '0');
                    const isoDate = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${dNum}`;
                    let borderClass = filterType === 'NO STATUS' ? 'border-red-500/30' : 'border-white/10';
                    return `<div onclick="selectFromList('${isoDate}', '${r[1]}')" class="bg-white/5 p-4 rounded-xl border ${borderClass} mb-2 active:scale-95 transition-all">
                        <p class="text-[11px] font-black text-white uppercase">${r[2]}</p>
                        <p class="text-[8px] text-slate-500 font-bold uppercase mt-1">${r.dateRef} • ${r[1]}</p>
                    </div>`;
                }).join('') || '<p class="text-center py-10 text-slate-600 font-black text-[10px] uppercase">Data Kosong</p>';
            } catch (e) { container.innerHTML = 'Error fetching data!'; }
        }

        function selectFromList(date, venue) { document.getElementById('input-date').value = date; document.getElementById('input-venue').value = venue.toUpperCase(); closeModal(); checkAvailability(); }

        // LOCK SYSTEM
        function toggleLock(isLocked) {
            const inputs = document.querySelectorAll('#form-details input, #form-details select');
            const btnSave = document.getElementById('btn-save');
            const btnUnlock = document.getElementById('btn-unlock');
            inputs.forEach(el => el.disabled = isLocked);
            if (isLocked) { btnSave.style.display = 'none'; btnUnlock.style.display = 'block'; }
            else { btnSave.style.display = 'flex'; btnUnlock.style.display = 'none'; document.getElementById('avail-status').innerHTML = "🔓 EDIT MODE ACTIVE"; }
        }

        // CORE LOGIC
        function formatCurrency(el) {
            let val = el.value.replace(/[^0-9]/g, ''); el.value = val ? "Rp " + new Intl.NumberFormat('id-ID').format(val) : "";
            document.getElementById('input-price').value = val || 0; calcTotal();
        }
        function calcTotal() {
            const total = (document.getElementById('input-pax').value || 0) * (document.getElementById('input-price').value || 0);
            document.getElementById('display-total').innerText = "Rp " + total.toLocaleString('id-ID');
        }
        function updateStatusUI() {
            const status = document.getElementById('input-status').value;
            const btnDel = document.getElementById('btn-delete');
            if (status === "TENTATIVE" || status === "") btnDel.classList.remove('hidden');
            else btnDel.classList.add('hidden');
        }

        function populateForm(r) {
            document.getElementById('input-customer').value = r[2] || "";
            const currentStatus = (r[3] || "").toUpperCase();
            document.getElementById('input-status').value = currentStatus;
            document.getElementById('input-package').value = (r[4] || "").toUpperCase();
            document.getElementById('input-sales').value = (r[6] || "").toUpperCase();
            document.getElementById('input-time').value = r[7] || "";
            document.getElementById('input-pax').value = r[9] ? r[9].toString().replace(/[^0-9]/g, '') : 0;
            const pr = r[10] ? r[10].toString().replace(/[^0-9]/g, '') : 0;
            document.getElementById('input-price').value = pr;
            document.getElementById('input-price-display').value = pr > 0 ? "Rp " + new Intl.NumberFormat('id-ID').format(pr) : "";
            calcTotal();
            if (currentStatus === "CONFIRM" || currentStatus === "DONE") toggleLock(true);
            else toggleLock(false);
        }

        async function checkAvailability() {
            const dVal = document.getElementById('input-date').value; const vVal = document.getElementById('input-venue').value;
            if (!dVal || !vVal) return;
            const statusDiv = document.getElementById('avail-status');
            statusDiv.innerHTML = "CHECKING..."; statusDiv.className = "w-full py-2 rounded-xl text-[9px] font-black border text-center bg-white/5 text-slate-400 border-white/10 block animate-pulse";
            statusDiv.classList.remove('hidden');
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${monthNames[new Date(dVal).getMonth()]}!A8:M132?key=${API_KEY}`);
                const data = await res.json();
                let curDay = "", found = null;
                (data.values || []).forEach(r => {
                    if (r[0]) curDay = r[0];
                    if (parseInt(curDay.match(/\d+/)) === new Date(dVal).getDate() && (r[1] || "").trim().toUpperCase() === vVal.toUpperCase()) if (r[2]) found = r;
                });
                document.getElementById('form-details').classList.remove('opacity-20', 'pointer-events-none');
                statusDiv.classList.remove('animate-pulse');
                if (found) {
                    statusDiv.innerHTML = `⚠️ OCCUPIED: ${found[3] || 'NO STATUS'}`;
                    statusDiv.className = "w-full py-2 rounded-xl text-[9px] font-black border text-center bg-amber-500/10 text-amber-400 border-amber-500/20";
                    populateForm(found);
                } else {
                    statusDiv.innerHTML = "✅ VENUE AVAILABLE";
                    statusDiv.className = "w-full py-2 rounded-xl text-[9px] font-black border text-center bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                    resetForm(false);
                }
                updateStatusUI();
            } catch (e) {}
        }

        function resetForm(full) {
            if(full) { document.getElementById('input-date').value = ""; document.getElementById('input-venue').value = ""; document.getElementById('form-details').classList.add('opacity-20', 'pointer-events-none'); }
            ['input-customer', 'input-pax', 'input-price', 'input-price-display', 'input-time', 'input-status'].forEach(id => {
                const el = document.getElementById(id); el.value = ""; el.disabled = false;
            });
            document.getElementById('display-total').innerText = "Rp 0";
            document.getElementById('btn-save').style.display = 'flex';
            document.getElementById('btn-unlock').style.display = 'none';
            if(full) document.getElementById('avail-status').classList.add('hidden');
        }

        async function submitData() {
            const dVal = document.getElementById('input-date').value; if(!dVal) return alert("Pilih tanggal!");
            const btn = document.getElementById('btn-save'); btn.innerHTML = "SYNCING..."; btn.disabled = true;
            const payload = {
                action: "UPDATE", sheetName: monthNames[new Date(dVal).getMonth()], date: dVal,
                venue: document.getElementById('input-venue').value, customer: document.getElementById('input-customer').value,
                status: document.getElementById('input-status').value, package: document.getElementById('input-package').value,
                sales: document.getElementById('input-sales').value, time: document.getElementById('input-time').value,
                pax: document.getElementById('input-pax').value, price: document.getElementById('input-price').value
            };
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("✅ Sync Berhasil!"); resetForm(true);
            } catch (e) { alert("🚨 Sync Error!"); }
            finally { btn.innerHTML = "🚀 SYNC TO CLOUD"; btn.disabled = false; }
        }

        async function deleteData() {
            if(!confirm("Hapus data ini?")) return;
            const dVal = document.getElementById('input-date').value;
            const btn = document.getElementById('btn-delete'); btn.innerHTML = "DELETING..."; btn.disabled = true;
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "DELETE", sheetName: monthNames[new Date(dVal).getMonth()], date: dVal, venue: document.getElementById('input-venue').value }) });
                alert("✅ Terhapus!"); resetForm(true);
            } catch (e) { alert("🚨 Error!"); }
            finally { btn.innerHTML = "🗑️ DELETE DATA"; btn.disabled = false; }
        }
    </script>
</body>
</html>

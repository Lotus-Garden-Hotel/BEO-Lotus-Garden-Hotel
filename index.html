<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banquet Dashboard - V.9.1 Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg-deep: #020617; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --neon: #6366f1; --gate-bg: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        body.night-mode { --bg-deep: #000000; --glass: rgba(0, 0, 0, 0.8); --glass-border: #1e1b4b; --neon: #4f46e5; --gate-bg: #000000; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #f8fafc; padding: 8px; margin: 0; display: flex; flex-direction: column; height: 100dvh; gap: 6px; overflow: hidden; transition: background 0.3s ease; }
        
        .card-base { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 1rem; padding: 8px; transition: 0.3s; position: relative; }
        .nav-arrow { background: rgba(255,255,255,0.08); color: white; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; border: 1px solid var(--glass-border); }
        select, .search-input { background: transparent; color: white; border: none; outline: none; font-weight: 800; width: 100%; text-align: center; font-size: 12px; appearance: none; }
        .filter-btn { padding: 4px 10px; border-radius: 99px; font-size: 8px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .filter-btn.active { background: var(--neon); color: white; border-color: var(--neon); }
        .action-btn { background: rgba(255,255,255,0.1); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* ALERT TENTATIVE & LOGOUT UI */
        .tentative-glow { border: 1.5px solid #f59e0b !important; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.1); }
        .follow-up-badge { background: #f59e0b; color: #000; font-size: 7px; font-weight: 900; padding: 1px 4px; border-radius: 3px; text-transform: uppercase; margin-left: 4px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .btn-top { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: 0.2s; font-size: 14px; }
        .btn-logout { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.2); }
        .btn-logout:active { background: #f43f5e; color: white; scale: 0.9; }

        #event-container { overflow-y: auto; scrollbar-width: none; flex: 1; min-height: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* SECURITY GATE */
        #login-gate { background: var(--gate-bg); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; }
        .lux-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 102, 241, 0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.1); border-radius: 2rem; }
        .google-btn { background: #ffffff; color: #1f2937; font-weight: 700; transition: all 0.3s; border: 1px solid #e5e7eb; position: relative; overflow: hidden; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="no-scrollbar">

    <div id="login-gate" class="fixed inset-0 flex flex-col items-center justify-center p-8">
        <div class="lux-card w-full max-w-sm p-10 text-center space-y-8 backdrop-blur-3xl relative">
            <div class="space-y-2">
                <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-2xl font-extrabold tracking-tight text-white italic uppercase">Access Point</h2>
                <p class="text-[9px] font-bold text-slate-400 tracking-[0.4em] uppercase">Lotus Garden Kediri</p>
            </div>
            <button onclick="loginWithGoogle()" id="login-btn" class="google-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                <span class="text-sm tracking-tight uppercase font-black">Authorize with Google</span>
            </button>
        </div>
    </div>

    <div class="flex justify-between items-center px-1 flex-none">
        <div><h1 class="text-[12px] font-black italic uppercase text-indigo-400">Banquet Dashboard</h1><p class="text-[6px] font-bold text-slate-500 tracking-widest uppercase text-left">Kediri V.9.1 [Security Fix]</p></div>
        <div class="flex gap-2">
            <button onclick="toggleNightMode()" id="night-btn" class="btn-top bg-slate-800 border border-slate-700">🌙</button>
            <button onclick="logoutManual()" title="Logout" class="btn-top btn-logout">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <button onclick="window.location.href='graphics.html'" class="bg-indigo-500/20 text-indigo-400 px-2 py-1.5 rounded-full text-[8px] font-black border border-indigo-500/30">ANALYTICS →</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-2 flex-none">
        <div class="card-base py-1.5 flex items-center">
            <button onclick="changeMonth(-1)" class="nav-arrow">‹</button>
            <select id="month-select" onchange="resetDateOnly()" class="flex-1 uppercase">
                <option value="ALL">-- SEMUA --</option>
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <button onclick="changeMonth(1)" class="nav-arrow">›</button>
        </div>
        <div class="card-base py-1.5"><input type="text" id="customer-search" class="search-input uppercase" placeholder="CARI NAMA..." oninput="updateDashboard()"></div>
    </div>

    <div class="card-base py-1.5 flex items-center justify-between px-2 flex-none text-center">
        <button onclick="changeDate(-1)" class="nav-arrow">‹</button>
        <div class="flex flex-col items-center">
            <input type="date" id="date-input" onchange="syncMonthFromDate()" class="bg-transparent text-white font-bold text-[11px] outline-none">
            <button onclick="resetDateOnly()" class="text-[6px] font-bold text-slate-500 uppercase">Clear Date Filter</button>
        </div>
        <button onclick="changeDate(1)" class="nav-arrow">›</button>
    </div>

    <div class="flex items-center justify-between gap-1 px-1 flex-none">
        <div class="flex gap-1 overflow-x-auto no-scrollbar">
            <button onclick="setStatusFilter('ALL')" id="btn-ALL" class="filter-btn active">ALL</button>
            <button onclick="setStatusFilter('CONFIRM')" id="btn-CONFIRM" class="filter-btn text-emerald-500">CONFIRM</button>
            <button onclick="setStatusFilter('TENTATIVE')" id="btn-TENTATIVE" class="filter-btn text-amber-500">TENTATIVE</button>
            <button onclick="setStatusFilter('DONE')" id="btn-DONE" class="filter-btn text-indigo-400">DONE</button>
        </div>
        <div class="flex gap-1.5 pl-2 border-l border-white/10">
            <button onclick="toggleHighValue()" id="btn-hv" class="action-btn">💎</button>
            <button onclick="filterAllTentative()" id="btn-tent-all" class="action-btn" style="color:#f59e0b">🔔</button>
            <button onclick="refreshData()" id="btn-refresh" class="action-btn">🔄</button>
        </div>
    </div>

    <div class="card-base flex-1 flex flex-col overflow-hidden min-h-0">
        <div id="event-container" class="space-y-2 no-scrollbar pt-1"></div>
        <div class="mt-1.5 pt-1.5 border-t border-white/10 flex flex-col gap-1 flex-none">
            <div class="grid grid-cols-2 divide-x divide-white/10">
                <div class="text-center"><p class="text-[7px] font-bold text-slate-500 uppercase mb-1">Pax On-List</p><p id="daily-pax" class="text-[11px] font-black text-amber-400">0</p></div>
                <div class="text-center"><p class="text-[7px] font-bold text-slate-500 uppercase mb-1">Events</p><p id="daily-count" class="text-[11px] font-black text-slate-200">0</p></div>
            </div>
            <div class="grid grid-cols-2 border-t border-white/5 pt-1 text-center">
                <div><p class="text-[7px] font-bold text-slate-500 uppercase mb-1">Gross</p><p id="daily-gross" class="text-[12px] font-black">Rp0</p></div>
                <div class="border-l border-white/10"><p class="text-[7px] font-bold text-indigo-400 uppercase mb-1">Nett</p><p id="daily-nett" class="text-[12px] font-black text-indigo-300">Rp0</p></div>
            </div>
        </div>
    </div>

    <div class="flex-none space-y-1">
        <div class="card-base bg-gradient-to-br from-indigo-900/40 to-slate-900/60 py-2 text-center">
            <p id="mtd-label" class="text-[8px] font-black uppercase text-indigo-200 tracking-widest">ON-HAND REVENUE</p>
            <h2 id="mtd-onhand" class="text-xl font-black tracking-tighter leading-none my-1">Rp0</h2>
            <div class="flex items-center gap-2 px-4 mt-1">
                <div class="bg-white/10 h-1.5 flex-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="mtd-ach" class="text-[10px] font-black text-indigo-300">0%</span>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCX0--DGM_tp_2y7hBbrGiMfeVyToVD4zM",
            authDomain: "banquet-dashboard-kediri.firebaseapp.com",
            projectId: "banquet-dashboard-kediri",
            storageBucket: "banquet-dashboard-kediri.firebasestorage.app",
            messagingSenderId: "716626784276",
            appId: "1:716626784276:web:4f7d4d51dace341d21b701"
        };
        firebase.initializeApp(firebaseConfig);
        const provider = new firebase.auth.GoogleAuthProvider();

        const allowedEmails = [
            "it.lotusgardenbywh@gmail.com", 
            "sm.lotusgardenbywh@gmail.com",
            "gm.lotusgardenbywh@gmail.com"
        ];

        const API_KEY = 'AIzaSyBZjSmOA81ftVsIJT5etEL19NjPdYTVSQk';
        const SHEET_ID = '1MXwfVXORuTd125BCkKYP_mHC_6O_Z1mZcGno2VCGOeE';
        let cachedRows = []; let currentStatusFilter = 'ALL'; let isHighValueMode = false; let isGlobalTentative = false;

        firebase.auth().onAuthStateChanged((user) => {
            const gate = document.getElementById('login-gate');
            if (user) {
                if (allowedEmails.includes(user.email)) {
                    gate.style.transform = "translateY(-100%)";
                    setTimeout(() => { gate.style.display = 'none'; handleInit(); }, 600);
                } else {
                    firebase.auth().signOut();
                    alert("Akses Ditolak!");
                }
            } else {
                gate.style.display = 'flex';
                gate.style.transform = "translateY(0)";
            }
        });

        function logoutManual() {
            if(confirm("Keluar dari sistem?")) {
                firebase.auth().signOut();
            }
        }

        async function loginWithGoogle() {
            try { await firebase.auth().signInWithPopup(provider); } catch (e) { console.error(e); }
        }

        async function handleInit() {
            const urlParams = new URLSearchParams(window.location.search);
            const venue = urlParams.get('venue');
            if (venue) {
                document.getElementById('month-select').value = "ALL";
                document.getElementById('customer-search').value = decodeURIComponent(venue);
            } else { setToday(); }
            updateDashboard();
        }

        async function updateDashboard() {
            const container = document.getElementById('event-container');
            const search = document.getElementById('customer-search').value.toLowerCase().trim();
            const dateVal = document.getElementById('date-input').value;
            const monthVal = document.getElementById('month-select').value;
            
            try {
                if (cachedRows.length === 0) {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Summary!A1:P200?key=${API_KEY}`);
                    const data = await res.json();
                    cachedRows = data.values || [];
                }
                
                let html = ''; let lCount = 0; let lGross = 0; let lPax = 0; let mtdNett = 0;

                for (let i = 26; i < cachedRows.length; i++) {
                    const r = cachedRows[i]; if (!r || !r[9] || !r[13]) continue;
                    const gVal = cleanVal(r[14]); const pVal = cleanVal(r[11]);
                    const sStat = (r[13]||'').toUpperCase();
                    const vName = (r[15]||'').toLowerCase();
                    const [dP, mP] = r[9].split('/');
                    
                    if (monthVal === "ALL" || parseInt(mP) === parseInt(monthVal)) {
                        if (sStat.includes("CONFIRM") || sStat.includes("DONE")) mtdNett += (gVal / 1.21);
                    }

                    let mTime = (search.length >= 1) ? true : (dateVal ? (parseInt(dP)==parseInt(dateVal.split('-')[2]) && parseInt(mP)==parseInt(dateVal.split('-')[1])) : (monthVal !== "ALL" ? parseInt(mP) === parseInt(monthVal) : true));
                    let mStatus = (currentStatusFilter === 'ALL' || sStat.includes(currentStatusFilter));
                    let mSearch = (search === "" || r[10].toLowerCase().includes(search) || vName.includes(search));
                    let mHV = (!isHighValueMode || gVal >= 10000000);

                    if (mTime && mStatus && mSearch && mHV) {
                        lCount++; lGross += gVal; lPax += pVal;
                        let isTent = sStat.includes("TENTATIVE");
                        let cCol = sStat.includes("DONE") ? 'text-indigo-300 bg-indigo-500/30' : (sStat.includes("CONFIRM") ? 'text-emerald-400 bg-emerald-500/20' : (isTent ? 'text-amber-400 bg-amber-500/20' : 'text-slate-400 bg-slate-500/10'));
                        let followUpBadge = isTent ? `<span class="follow-up-badge">FOLLOW UP</span>` : '';

                        html += `<div class="bg-white/[0.04] border border-white/10 rounded-xl p-2.5 relative ${isTent ? 'tentative-glow' : ''}">
                            <div class="absolute top-0 right-0 flex items-center z-10 text-[6px] font-black uppercase">
                                <span class="bg-indigo-500/10 text-indigo-200 px-1.5 py-0.5">${r[9]}</span>
                                <span class="bg-white/10 px-1.5 py-0.5">${(r[15]||'TBD')}</span>
                                <span class="${cCol} px-1.5 py-0.5">${sStat}${followUpBadge}</span>
                            </div>
                            <p class="text-indigo-300 text-[10px] font-bold uppercase truncate pr-20 mb-1 relative z-10">${r[10]}</p>
                            <div class="flex justify-between items-end leading-none relative z-10">
                                <p class="text-xl font-black text-white">${r[11]||'0'}<span class="text-[7px] text-slate-500 ml-0.5">PAX</span></p>
                                <p class="text-emerald-400 text-xs font-black">${formatRp(gVal)}</p>
                            </div>
                        </div>`;
                    }
                }

                let tBud = 0;
                if (monthVal !== "ALL") { tBud = cleanVal(cachedRows[88 + (parseInt(monthVal) - 1)]?.[1]); } 
                else { for (let j = 88; j <= 99; j++) tBud += cleanVal(cachedRows[j]?.[1]); }

                const ach = tBud > 0 ? Math.round((mtdNett / tBud) * 100) : 0;
                container.innerHTML = lCount > 0 ? html : `<div class="py-10 opacity-20 text-center text-[10px] font-black uppercase">No Data Found</div>`;
                document.getElementById('daily-pax').innerText = lPax.toLocaleString('id-ID');
                document.getElementById('daily-count').innerText = lCount;
                document.getElementById('daily-gross').innerText = formatRp(lGross);
                document.getElementById('daily-nett').innerText = formatRp(lGross / 1.21);
                document.getElementById('mtd-onhand').innerText = formatRp(mtdNett);
                document.getElementById('mtd-ach').innerText = ach + "%";
                document.getElementById('progress-bar').style.width = Math.min(ach, 100) + "%";
            } catch (e) { console.error(e); }
        }

        function cleanVal(s) { return parseFloat((s||"0").toString().replace(/[^0-9,-]+/g, "").replace(",", ".")) || 0; }
        function formatRp(n) { return "Rp" + Math.round(n).toLocaleString('id-ID'); }
        function setToday() { let n = new Date(); document.getElementById('date-input').value = new Date(n.getTime() - (n.getTimezoneOffset()*60000)).toISOString().split('T')[0]; document.getElementById('month-select').value = (n.getMonth() + 1).toString(); }
        function resetDateOnly() { document.getElementById('date-input').value = ""; updateDashboard(); }
        function syncMonthFromDate() { let v = document.getElementById('date-input').value; if(v) document.getElementById('month-select').value = parseInt(v.split('-')[1]).toString(); updateDashboard(); }
        function changeMonth(dir) { let s = document.getElementById('month-select'); let v = s.value === "ALL" ? 1 : parseInt(s.value) + dir; if(v>12)v=1; if(v<1)v=12; s.value = v.toString(); resetDateOnly(); }
        function changeDate(days) { let d = document.getElementById('date-input'); let c = new Date(d.value || new Date()); c.setDate(c.getDate() + days); d.value = c.toISOString().split('T')[0]; syncMonthFromDate(); }
        function setStatusFilter(s) { currentStatusFilter = s; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + s).classList.add('active'); updateDashboard(); }
        function toggleHighValue() { isHighValueMode = !isHighValueMode; updateDashboard(); }
        function toggleNightMode() { const isNight = document.body.classList.toggle('night-mode'); localStorage.setItem('nightMode', isNight ? 'enabled' : 'disabled'); document.getElementById('night-btn').innerText = isNight ? '☀️' : '🌙'; }
        function filterAllTentative() { isGlobalTentative = !isGlobalTentative; if(isGlobalTentative) { document.getElementById('month-select').value = "ALL"; resetDateOnly(); setStatusFilter('TENTATIVE'); } else { setToday(); setStatusFilter('ALL'); updateDashboard(); } }
        async function refreshData() { const btn = document.getElementById('btn-refresh'); btn.classList.add('animate-spin'); cachedRows = []; document.getElementById('customer-search').value = ""; setStatusFilter('ALL'); setToday(); await updateDashboard(); setTimeout(() => btn.classList.remove('animate-spin'), 600); }
    </script>
</body>
</html>

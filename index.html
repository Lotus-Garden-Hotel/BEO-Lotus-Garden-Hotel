<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banquet Dashboard - V.9.4 Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg-deep: #020617; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --neon: #6366f1; --gate-bg: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        body.night-mode { --bg-deep: #000000; --glass: rgba(255, 255, 255, 0.05); --glass-border: #1e1b4b; --neon: #4f46e5; --gate-bg: #000000; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #f8fafc; padding: 8px; margin: 0; display: flex; flex-direction: column; height: 100dvh; gap: 6px; overflow: hidden; transition: background 0.3s ease; }
        
        .card-base { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 1rem; padding: 8px; transition: 0.3s; position: relative; }
        .nav-arrow { background: rgba(255,255,255,0.08); color: white; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; border: 1px solid var(--glass-border); }
        select, .search-input { background: transparent; color: white; border: none; outline: none; font-weight: 800; width: 100%; text-align: center; font-size: 11px; appearance: none; }
        .filter-btn { padding: 4px 10px; border-radius: 99px; font-size: 8px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .filter-btn.active { background: var(--neon); color: white; border-color: var(--neon); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .action-btn { background: rgba(255,255,255,0.05); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; border: 1px solid var(--glass-border); }
        
        .tentative-glow { border: 1.2px solid #f59e0b !important; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.05); }
        .follow-up-badge { background: #f59e0b; color: #000; font-size: 6px; font-weight: 900; padding: 1px 3px; border-radius: 2px; text-transform: uppercase; margin-left: 4px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .btn-top { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: 0.2s; font-size: 14px; }
        .btn-logout { background: rgba(244, 63, 94, 0.1); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.2); }

        #event-container { overflow-y: auto; scrollbar-width: none; flex: 1; min-height: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Copy Feedback Style */
        .copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #6366f1; color: white; padding: 6px 16px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 1000; animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        #login-gate { background: var(--gate-bg); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; }
        .lux-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 2rem; }
        .google-btn { background: #ffffff; color: #1f2937; font-weight: 700; border: 1px solid #e5e7eb; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="no-scrollbar">

    <div id="login-gate" class="fixed inset-0 flex flex-col items-center justify-center p-8">
        <div class="lux-card w-full max-w-sm p-10 text-center space-y-8 backdrop-blur-3xl">
            <div class="space-y-2">
                <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl rotate-3">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-2xl font-black tracking-tight text-white italic uppercase">Access Point</h2>
                <p class="text-[9px] font-bold text-slate-500 tracking-[0.4em] uppercase">Lotus Garden Kediri</p>
            </div>
            <button onclick="loginWithGoogle()" class="google-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                <span class="text-sm tracking-tight uppercase font-black">Authorize System</span>
            </button>
        </div>
    </div>

    <div class="flex justify-between items-center px-1 flex-none">
        <div><h1 class="text-[12px] font-black italic uppercase text-indigo-400">Banquet Dashboard</h1><p class="text-[6px] font-bold text-slate-500 tracking-widest uppercase text-left">Kediri V.9.4 [Precision Mode]</p></div>
        <div class="flex gap-2">
            <button onclick="toggleNightMode()" id="night-btn" class="btn-top bg-slate-800 border border-slate-700">🌙</button>
            <button onclick="logoutManual()" class="btn-top btn-logout">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <button onclick="window.location.href='graphics.html'" class="bg-indigo-500/20 text-indigo-400 px-3 py-1.5 rounded-full text-[8px] font-black border border-indigo-500/30">ANALYTICS →</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-2 flex-none">
        <div class="card-base py-1.5 flex items-center">
            <button onclick="changeMonth(-1)" class="nav-arrow">‹</button>
            <select id="month-select" onchange="resetDateOnly()" class="flex-1 uppercase font-black"></select>
            <button onclick="changeMonth(1)" class="nav-arrow">›</button>
        </div>
        <div class="card-base py-1.5"><input type="text" id="customer-search" class="search-input uppercase placeholder:text-slate-600" placeholder="CARI NAMA..." oninput="updateDashboard()"></div>
    </div>

    <div class="card-base py-1.5 flex items-center justify-between px-2 flex-none text-center">
        <button onclick="changeDate(-1)" class="nav-arrow">‹</button>
        <div class="flex flex-col items-center">
            <input type="date" id="date-input" onchange="syncMonthFromDate()" class="bg-transparent text-white font-black text-[11px] outline-none uppercase">
            <button onclick="resetDateOnly()" class="text-[6px] font-bold text-slate-500 uppercase tracking-tighter">Clear Filter</button>
        </div>
        <button onclick="changeDate(1)" class="nav-arrow">›</button>
    </div>

    <div class="flex items-center justify-between gap-1 px-1 flex-none">
        <div class="flex gap-1 overflow-x-auto no-scrollbar">
            <button onclick="setStatusFilter('ALL')" id="btn-ALL" class="filter-btn active">ALL</button>
            <button onclick="setStatusFilter('CONFIRM')" id="btn-CONFIRM" class="filter-btn text-emerald-500">CONFIRM</button>
            <button onclick="setStatusFilter('TENTATIVE')" id="btn-TENTATIVE" class="filter-btn text-amber-500">TENTATIVE</button>
            <button onclick="setStatusFilter('DONE')" id="btn-DONE" class="filter-btn text-indigo-400">DONE</button>
        </div>
        <div class="flex gap-1.5 pl-2 border-l border-white/10">
            <button onclick="toggleHighValue()" id="btn-hv" class="action-btn">💎</button>
            <button onclick="filterAllTentative()" id="btn-tent-all" class="action-btn" style="color:#f59e0b">🔔</button>
            <button onclick="refreshData()" id="btn-refresh" class="action-btn">🔄</button>
        </div>
    </div>

    <div class="card-base flex-1 flex flex-col overflow-hidden min-h-0">
        <div id="event-container" class="space-y-1.5 no-scrollbar pt-1"></div>
        
        <div class="mt-2 pt-2 border-t border-white/5 grid grid-cols-4 gap-0.5 flex-none text-center bg-black/20 rounded-lg py-2">
            <div><p class="text-[6px] font-bold text-slate-500 uppercase">Pax</p><p id="daily-pax" class="text-[10px] font-black text-amber-400">0</p></div>
            <div class="border-l border-white/5"><p class="text-[6px] font-bold text-slate-500 uppercase">Events</p><p id="daily-count" class="text-[10px] font-black text-slate-200">0</p></div>
            <div class="border-l border-white/5 px-0.5"><p class="text-[6px] font-bold text-slate-500 uppercase">Gross</p><p id="daily-gross" class="text-[8.5px] font-black text-emerald-400 leading-tight">Rp0</p></div>
            <div class="border-l border-white/5 px-0.5 cursor-pointer active:scale-95 transition-transform" onclick="copyNettToClipboard()">
                <p class="text-[6px] font-bold text-indigo-400 uppercase">Nett (Copy)</p>
                <p id="daily-nett" class="text-[8.5px] font-black text-indigo-300 leading-tight">Rp0</p>
            </div>
        </div>
    </div>

    <div class="flex-none space-y-2 pb-1">
        <div class="card-base bg-gradient-to-br from-indigo-950/40 to-black/40 border-indigo-500/20 p-3">
            <div class="flex justify-between items-end mb-2">
                <div class="flex flex-col">
                    <p id="mtd-label" class="text-[7px] font-black text-indigo-300 tracking-[0.2em] uppercase">PERFORMANCE</p>
                    <p class="text-[6px] font-bold text-slate-500 uppercase mt-0.5">Realized Revenue (Nett)</p>
                </div>
                <h2 id="mtd-onhand" class="text-xl font-black tracking-tighter text-white">Rp0</h2>
            </div>
            
            <div class="relative w-full h-2.5 bg-black/40 rounded-full overflow-hidden border border-white/5">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-600 to-cyan-400 shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>

            <div class="flex justify-between mt-2.5 px-0.5">
                <div class="flex flex-col"><span class="text-[6px] font-bold text-slate-500 uppercase">Budget</span><span id="mtd-budget" class="text-[10px] font-black text-white mt-0.5">Rp0</span></div>
                <div class="flex flex-col items-center"><span class="text-[6px] font-bold text-slate-500 uppercase">Ach.</span><span id="mtd-ach" class="text-[10px] font-black text-indigo-300 mt-0.5">0%</span></div>
                <div class="flex flex-col items-end"><span class="text-[6px] font-bold text-slate-500 uppercase">Variance</span><span id="mtd-gap" class="text-[10px] font-black mt-0.5">Rp0</span></div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyCX0--DGM_tp_2y7hBbrGiMfeVyToVD4zM", authDomain: "banquet-dashboard-kediri.firebaseapp.com", projectId: "banquet-dashboard-kediri", storageBucket: "banquet-dashboard-kediri.firebasestorage.app", messagingSenderId: "716626784276", appId: "1:716626784276:web:4f7d4d51dace341d21b701" };
        firebase.initializeApp(firebaseConfig);
        const provider = new firebase.auth.GoogleAuthProvider();
        const allowedEmails = ["it.lotusgardenbywh@gmail.com", "sm.lotusgardenbywh@gmail.com",
"hrd.lotusgardenbywh@gmail.com", "kang.d14n@gmail.com", "abdullah.junaidi73@gmail.com", "kustianadwi83@gmail.com", "danangaditianggara@gmail.com", "munarsihagustina@gmail.com", "agussuryadi197878@gmail.com", "gm.lotusgardenbywh@gmail.com"];

        const API_KEY = 'AIzaSyBZjSmOA81ftVsIJT5etEL19NjPdYTVSQk';
        const SHEET_ID = '1MXwfVXORuTd125BCkKYP_mHC_6O_Z1mZcGno2VCGOeE';
        let cachedRows = []; let currentStatusFilter = 'ALL'; let isHighValueMode = false; let currentNettRaw = 0;

        firebase.auth().onAuthStateChanged((user) => {
            const gate = document.getElementById('login-gate');
            if (user && allowedEmails.includes(user.email)) {
                gate.style.transform = "translateY(-100%)";
                setTimeout(() => { gate.style.display = 'none'; handleInit(); }, 600);
            } else {
                if(user) firebase.auth().signOut();
                gate.style.display = 'flex'; gate.style.transform = "translateY(0)";
            }
        });

        async function loginWithGoogle() { try { await firebase.auth().signInWithPopup(provider); } catch (e) { console.error(e); } }
        function logoutManual() { if(confirm("Logout dari sistem?")) firebase.auth().signOut(); }

        // Populate Month Dropdown
        const monthNames = ["-- SEMUA --", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const s = document.getElementById('month-select');
        monthNames.forEach((m, i) => { let o = document.createElement('option'); o.value = i === 0 ? "ALL" : i; o.text = m.toUpperCase(); s.add(o); });

        // Fitur Copy to Clipboard
        function copyNettToClipboard() {
            const rawValue = Math.round(currentNettRaw).toString();
            navigator.clipboard.writeText(rawValue).then(() => {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerText = 'NETT COPIED TO CLIPBOARD';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }

        async function updateDashboard() {
            if (!firebase.auth().currentUser) return;
            const container = document.getElementById('event-container');
            const search = document.getElementById('customer-search').value.toLowerCase().trim();
            const dateVal = document.getElementById('date-input').value;
            const monthVal = document.getElementById('month-select').value;
            
            try {
                if (cachedRows.length === 0) {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Summary!A1:P200?key=${API_KEY}`);
                    const data = await res.json();
                    cachedRows = data.values || [];
                }
                
                let html = ''; let lCount = 0; let lGross = 0; let lPax = 0; let mtdNett = 0;

                for (let i = 26; i < cachedRows.length; i++) {
                    const r = cachedRows[i]; if (!r || !r[9] || !r[13]) continue;
                    const gVal = cleanVal(r[14]); const pVal = cleanVal(r[11]);
                    const sStat = (r[13]||'').toUpperCase();
                    const vName = (r[15]||'').toLowerCase();
                    const [dP, mP] = r[9].split('/');
                    
                    if (monthVal === "ALL" || parseInt(mP) === parseInt(monthVal)) {
                        if (sStat.includes("CONFIRM") || sStat.includes("DONE")) mtdNett += (gVal / 1.21);
                    }

                    let mTime = (search.length >= 1) ? true : (dateVal ? (parseInt(dP)==parseInt(dateVal.split('-')[2]) && parseInt(mP)==parseInt(dateVal.split('-')[1])) : (monthVal !== "ALL" ? parseInt(mP) === parseInt(monthVal) : true));
                    let mStatus = (currentStatusFilter === 'ALL' || sStat.includes(currentStatusFilter));
                    let mSearch = (search === "" || r[10].toLowerCase().includes(search) || vName.includes(search));
                    let mHV = (!isHighValueMode || gVal >= 10000000);

                    if (mTime && mStatus && mSearch && mHV) {
                        lCount++; lGross += gVal; lPax += pVal;
                        let isTent = sStat.includes("TENTATIVE");
                        let cCol = sStat.includes("DONE") ? 'text-indigo-300 bg-indigo-500/20' : (sStat.includes("CONFIRM") ? 'text-emerald-400 bg-emerald-500/10' : (isTent ? 'text-amber-400 bg-amber-500/10' : 'text-slate-400 bg-white/5'));
                        
                        html += `<div class="bg-white/[0.03] border border-white/5 rounded-xl p-2 relative ${isTent ? 'tentative-glow' : ''}">
                            <div class="absolute top-0 right-0 flex items-center z-10 text-[5.5px] font-black uppercase">
                                <span class="bg-indigo-500/10 text-indigo-300 px-1.5 py-0.5 border-l border-white/5">${r[9]}</span>
                                <span class="bg-white/5 text-slate-400 px-1.5 py-0.5 border-l border-white/5">${(r[15]||'TBD')}</span>
                                <span class="${cCol} px-1.5 py-0.5 border-l border-white/5">${sStat}${isTent ? '<span class="follow-up-badge">!</span>' : ''}</span>
                            </div>
                            <p class="text-indigo-200/80 text-[9px] font-bold uppercase truncate pr-24 mb-1">${r[10]}</p>
                            <div class="flex justify-between items-end leading-none">
                                <p class="text-lg font-black text-white">${r[11]||'0'}<span class="text-[6px] text-slate-600 ml-0.5 tracking-tighter">PAX</span></p>
                                <p class="text-emerald-400 text-[11px] font-black">${formatRp(gVal)}</p>
                            </div>
                        </div>`;
                    }
                }

                currentNettRaw = lGross / 1.21;
                document.getElementById('mtd-label').innerText = monthVal === "ALL" ? "PERFORMANCE OVERALL" : `PERFORMANCE ${monthNames[parseInt(monthVal)].toUpperCase()}`;
                let tBud = monthVal !== "ALL" ? cleanVal(cachedRows[88 + (parseInt(monthVal) - 1)]?.[1]) : 0;
                if(monthVal === "ALL") { for (let j = 88; j <= 99; j++) tBud += cleanVal(cachedRows[j]?.[1]); }
                const gap = mtdNett - tBud; const ach = tBud > 0 ? Math.round((mtdNett / tBud) * 100) : 0;

                container.innerHTML = lCount > 0 ? html : `<div class="py-10 opacity-20 text-center text-[8px] font-black uppercase">Data Kosong</div>`;
                document.getElementById('daily-pax').innerText = lPax.toLocaleString('id-ID');
                document.getElementById('daily-count').innerText = lCount;
                document.getElementById('daily-gross').innerText = formatRp(lGross);
                document.getElementById('daily-nett').innerText = formatRp(currentNettRaw);
                document.getElementById('mtd-onhand').innerText = formatRp(mtdNett);
                document.getElementById('mtd-budget').innerText = formatRp(tBud);
                document.getElementById('mtd-gap').innerText = formatRp(gap);
                document.getElementById('mtd-gap').className = `text-[10px] font-black mt-0.5 ${gap < 0 ? 'text-rose-500' : 'text-emerald-400'}`;
                document.getElementById('mtd-ach').innerText = ach + "%";
                document.getElementById('progress-bar').style.width = Math.min(ach, 100) + "%";
            } catch (e) { console.error(e); }
        }

        function cleanVal(s) { return parseFloat((s||"0").toString().replace(/[^0-9,-]+/g, "").replace(",", ".")) || 0; }
        function formatRp(n) { return "Rp" + Math.round(n).toLocaleString('id-ID'); }
        function setToday() { let n = new Date(); document.getElementById('date-input').value = new Date(n.getTime() - (n.getTimezoneOffset()*60000)).toISOString().split('T')[0]; document.getElementById('month-select').value = (n.getMonth() + 1).toString(); }
        function resetDateOnly() { document.getElementById('date-input').value = ""; updateDashboard(); }
        function syncMonthFromDate() { let v = document.getElementById('date-input').value; if(v) document.getElementById('month-select').value = parseInt(v.split('-')[1]).toString(); updateDashboard(); }
        function changeMonth(dir) { let s = document.getElementById('month-select'); let v = s.value === "ALL" ? 1 : parseInt(s.value) + dir; if(v>12)v=1; if(v<1)v=12; s.value = v.toString(); resetDateOnly(); }
        function changeDate(days) { let d = document.getElementById('date-input'); let c = new Date(d.value || new Date()); c.setDate(c.getDate() + days); d.value = c.toISOString().split('T')[0]; syncMonthFromDate(); }
        function setStatusFilter(s) { currentStatusFilter = s; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + s).classList.add('active'); updateDashboard(); }
        function toggleHighValue() { isHighValueMode = !isHighValueMode; updateDashboard(); }
        function toggleNightMode() { const isNight = document.body.classList.toggle('night-mode'); document.getElementById('night-btn').innerText = isNight ? '☀️' : '🌙'; }
        function filterAllTentative() { if(confirm("Check Status Tentative untuk di Followup.")) { document.getElementById('month-select').value = "ALL"; resetDateOnly(); setStatusFilter('TENTATIVE'); } }
        async function refreshData() { const btn = document.getElementById('btn-refresh'); btn.classList.add('animate-spin'); cachedRows = []; document.getElementById('customer-search').value = ""; setStatusFilter('ALL'); setToday(); await updateDashboard(); setTimeout(() => btn.classList.remove('animate-spin'), 600); }
        function handleInit() { const v = new URLSearchParams(window.location.search).get('venue'); if (v) { document.getElementById('month-select').value = "ALL"; document.getElementById('customer-search').value = decodeURIComponent(v); } else { setToday(); } updateDashboard(); }
    </script>
</body>
</html>
